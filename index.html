<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAAN Trust Donation</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Segoe UI;
text-align:center;
background:#f4f7fb;
padding:40px;
}
input{
padding:10px;
width:250px;
margin:8px;
}
button{
padding:10px 20px;
background:#d4a017;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h2>DAAN Trust Donation</h2>

<input type="text" id="name" placeholder="Your Name" required><br>
<input type="email" id="email" placeholder="Your Email" required><br>
<input type="number" id="amount" placeholder="Amount (INR)" required><br>

<button onclick="payNow()">Donate Now</button>

<script>

function generateReceiptNumber(){
return "DAAN-" + Date.now();
}

function payNow(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let amount=document.getElementById("amount").value;

if(!name||!email||!amount){
alert("Please fill all fields");
return;
}

let receiptNo=generateReceiptNumber();

var options = {
"key": "RAZORPAY_KEY_ID",   // 🔴 yahan apni Razorpay Key ID daalna
"amount": amount*100,
"currency": "INR",
"name": "DAAN Trust",
"description": "Donation",
"handler": function (response){

saveToSheet(name,email,amount,receiptNo,response.razorpay_payment_id);
generatePDF(name,email,amount,receiptNo,response.razorpay_payment_id);

alert("Payment Successful! Receipt Downloaded.");
}
};

var rzp1 = new Razorpay(options);
rzp1.open();
}

function generatePDF(name,email,amount,receiptNo,paymentId){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFontSize(16);
doc.text("DAAN Trust Donation Receipt",20,20);

doc.setFontSize(12);
doc.text("Receipt No: "+receiptNo,20,40);
doc.text("Name: "+name,20,50);
doc.text("Email: "+email,20,60);
doc.text("Amount: INR "+amount,20,70);
doc.text("Payment ID: "+paymentId,20,80);
doc.text("Udyam No: UDYAM-UP-10-0045590",20,100);

doc.save("DAAN_Receipt_"+receiptNo+".pdf");
}

function saveToSheet(name,email,amount,receiptNo,paymentId){

fetch("https://script.google.com/macros/s/AKfycbxUSNxPUn6U7NQiUd6e0A_cpW3lgqtmguK4JaLQSNKxzDx_HWwHPdIsgJwMyDwwTpGw/exec", {
method: "POST",
body: JSON.stringify({
name:name,
email:email,
amount:amount,
receipt:receiptNo,
payment:paymentId
}),
headers:{
"Content-Type":"application/json"
}
});

}

</script>

</body>
</html>
